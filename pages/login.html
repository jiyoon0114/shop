<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display+SC:ital,wght@0,400;0,700;0,900;1,400;1,700;1,900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/login.css">
  <title>login</title>
</head>
<body>
  <div class="container">
    <div class="login-picture-box">
      <div class="login-box glass-card">
        <span class="title playfair-display-sc-regular glass-card">Log in</span>
        <form action="" method="post">
          <div class="text">
            <label for="id" class="label-id playfair-display-sc-regular">Email</label>
            <input type="text" class=" glass-card input-design" name="id" id="id" required>
            <label for="password" class="label-id playfair-display-sc-regular">password</label>
            <input type="password" class="glass-card input-design" id="password" required>
          </div>
          <div>
            <button type="submit" class="glass-card btn playfair-display-sc-regular">log in</button>
            <a href="sign-up.html" class="glass-card  btn btn-signup playfair-display-sc-regular">Sign in</a>
          </div>
        </form>
      </div>
      <div class="right-picture">
        <span class="login-sub glass-card playfair-display-sc-regular">Access your space</span>
      </div>
    </div>
  </div>
</body>
</html>
